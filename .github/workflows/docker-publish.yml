name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 1. Fetch the latest version from upstream
      - name: Get Latest Upstream Version
        id: get_version
        run: |
          LATEST_TAG=$(gh release view --repo dsp56300/gearmulator --json tagName --jq .tagName)
          echo "VERSION=$LATEST_TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      # 2. Log in (needed for both checking existence and pushing)
      - name: Log in to the Container registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Smart Skip Logic: 
      # We ONLY skip if it's NOT a Pull Request AND the image already exists.
      - name: Check if image exists
        id: check_exists
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Pull Request detected: Forcing build to test changes."
            echo "exists=false" >> $GITHUB_OUTPUT
          elif docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }} > /dev/null 2>&1; then
            echo "Image already exists. Skipping build."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "New version or manual trigger. Proceeding."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 4. Extract metadata
      - name: Extract Docker metadata
        if: steps.check_exists.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.VERSION }}

      # 5. Build and Push
      - name: Build and push Docker image
        if: steps.check_exists.outputs.exists != 'true'
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          # Only push if it's NOT a pull request
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VERSION=${{ steps.get_version.outputs.VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
